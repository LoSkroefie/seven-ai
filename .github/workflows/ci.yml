name: Seven CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

concurrency:
  group: seven-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / Ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Seven and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,mcp,documents,music]"
      - name: Compile package and release scripts
        run: python -m compileall -q seven scripts
      - name: Run current test suite with coverage
        run: python -m pytest --cov=seven --cov-report=term-missing --cov-report=xml -q
        env:
          SEVEN_CI: "true"
      - name: Upload coverage report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ubuntu-python-3.13
          path: coverage.xml

  inventory:
    name: Inventory and legacy parse gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Regenerate inventories
        run: |
          python scripts/generate_file_inventory.py
          python scripts/generate_legacy_symbol_inventory.py
          python scripts/verify_repository_contract.py
      - name: Verify universal dependency lock
        run: |
          python -m pip install uv==0.11.6
          uv lock --check
      - name: Fail on undocumented repository drift
        run: git diff --exit-code -- docs/FILE_INVENTORY.csv docs/LEGACY_SYMBOL_INVENTORY.csv

  wheel-windows:
    name: Wheel lifecycle / Windows Python 3.13
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build wheel
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip wheel . --no-deps --wheel-dir dist
          $wheel = (Get-ChildItem dist -Filter *.whl | Select-Object -First 1).FullName
          python scripts/verify_wheel.py $wheel
      - name: Verify clean core install and uninstall
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem dist -Filter *.whl | Select-Object -First 1).FullName
          python scripts/verify_install_lifecycle.py $wheel

  wheel-optional-ubuntu:
    name: Wheel lifecycle / Ubuntu optional integrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Build and verify wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip wheel . --no-deps --wheel-dir dist
          python scripts/verify_wheel.py dist/*.whl
      - name: Verify clean optional install and uninstall
        run: python scripts/verify_install_lifecycle.py dist/*.whl --extras mcp,documents,music,robotics,tray,browser
